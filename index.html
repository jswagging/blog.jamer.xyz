<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>blog</title>
<link rel="stylesheet" href="resources/css/style.css" />
</head>
<body>
  <div class="site">

    <header class="site-header">
      <a href="https://blog.jamer.xyz/"><span class="site-title">blog</span></a>
    </header>

    <main>
      <ul class="post-list" id="post-list">
        <li class="empty-state">Loading blog posts…</li>
      </ul>
    </main>

  </div>

  <script src="resources/js/blog.js"></script>
  <script>
    async function render() {
      const list = document.getElementById('post-list');
      try {
        const posts = await loadAllPosts();

        if (posts.length === 0) {
          list.innerHTML = '<li class="empty-state">No blog posts yet.</li>';
          return;
        }

        list.innerHTML = posts.map((post) => {
          const bannerStyle = post.banner
            ? ` style="background-image: linear-gradient(rgba(21,22,26,0.55), rgba(21,22,26,0.55)), url('${post.banner}'); background-size: cover; background-position: center;"`
            : '';
          return `
          <li${bannerStyle}>
            <a href="post.html?p=${encodeURIComponent(post.filename)}">
              <span class="entry-date">${formatDate(post.date)}</span>
              <h2 class="entry-title">${post.title}</h2>
              <p class="entry-excerpt">${post.description || excerptOf(post.body)}</p>
            </a>
          </li>
        `;
        }).join('');
      } catch (err) {
        list.innerHTML = `<li class="empty-state">Could not load entries: ${err.message}</li>`;
      }
    }

    render();
  </script>
</body>
</html>
